<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác minh</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f1f3f5;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 80px;
    }

    .box {
      width: 90%;
      max-width: 330px;
      text-align: center;
    }

    .notice {
      background: #fff3cd;
      color: #8a6d00;
      font-weight: bold;
      padding: 14px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    }

    .title {
      font-size: 20px;
      margin-bottom: 15px;
      color: #222;
    }

    .question {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 18px;
      color: #000;
    }

    input {
      width: 100%;
      padding: 13px;
      font-size: 20px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      font-size: 20px;
      border: none;
      border-radius: 4px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #155fc0;
    }

    .line {
      height: 5px;
      background: #e5e5e5;
      border-radius: 10px;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="notice">
      N.-Ẹ.-P ĐẦU ĐỂ KÍCH HOẠT TOÀN BỘ ƯU ĐÃI TÂN THỦ
    </div>

    <div class="card">
      <div class="title">Xác minh bạn là con người</div>
      <div class="question">6 + 3 = ?</div>

      <input type="text" id="answer" placeholder="">
      <button onclick="verify()">Xác nhận</button>

      <div class="line"></div>
    </div>
  </div>

  <script>
    function verify() {
      let ans = document.getElementById("answer").value.trim();

      if (ans === "9") {
        window.location.href = "https://gaviet388.top";
      } else {
        alert("Sai rồi! Vui lòng thử lại.");
      }
    }
  </script>
</body>
</html>
